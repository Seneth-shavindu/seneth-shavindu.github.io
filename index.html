    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --star-color: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo span { color: var(--accent-color); }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* --- MAIN LAYOUT --- */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* --- FEATURED HERO BANNER --- */
        .hero-banner {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%);
            border-radius: 16px;
            padding: 3rem;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .hero-content {
            max-width: 50%;
            z-index: 2;
        }

        .hero-tag {
            background-color: var(--accent-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 2.5rem;
            margin: 1rem 0;
            font-weight: 700;
            line-height: 1.2;
        }

        /* --- CATEGORIES CHIPS --- */
        .categories-container {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            scrollbar-width: none; /* Firefox */
        }
        .categories-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .category-chip {
            background-color: var(--card-bg);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .category-chip.active, .category-chip:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* --- PRODUCT GRID --- */
        .grid-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.75rem;
        }

        /* --- PRODUCT CARD --- */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border-color: #475569;
        }

        .badge {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background-color: #ef4444;
            color: white;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            z-index: 10;
        }

        .image-container {
            position: relative;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            background-color: #0f172a;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-cat {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--star-color);
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .rating span {
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-top: auto;
            margin-bottom: 1rem;
        }

        .current-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .original-price {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* --- ANIMATED BUTTON --- */
        .affiliate-btn {
            background: linear-gradient(90deg, var(--accent-color), #2563eb);
            color: white;
            text-align: center;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .affiliate-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .product-card:hover .affiliate-btn::after {
            left: 125%;
        }

        .affiliate-btn:hover {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        /* --- RESPONSIVE MOBILE DESIGN --- */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                padding: 1rem;
            }
            .search-container {
                width: 100%;
            }
            .hero-banner {
                padding: 1.5rem;
            }
            .hero-content {
                max-width: 100%;
            }
            .hero-title {
                font-size: 1.75rem;
            }
            main {
                padding: 0 1rem;
            }
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
            .product-card {
                border-radius: 8px;
            }
            .product-info {
                padding: 0.75rem;
            }
            .product-name {
                font-size: 0.9rem;
                height: 2.5rem;
            }
            .current-price {
                font-size: 1.1rem;
            }
            .affiliate-btn {
                padding: 0.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

        // Core App Logic

        let searchQuery = "";

        const productGrid = document.getElementById('productGrid');
        const categoryContainer = document.getElementById('categoryContainer');
        const searchInput = document.getElementById('searchInput');

        // Extract categories dynamically
        const categories = ["All", ...new Set(products.map(p => p.category))];

        function renderCategories() {
            categoryContainer.innerHTML = categories.map(cat => `
                <div class="category-chip ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">
                    ${cat}
                </div>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }

        function renderProducts() {
            const filteredProducts = products.filter(product => {
                const matchesCategory = currentCategory === "All" || product.category === currentCategory;
                const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      product.category.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if(filteredProducts.length === 0) {
                productGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem 0;">No items found matching your filter criteria.</p>`;
                return;
            }

            productGrid.innerHTML = filteredProducts.map(product => {
                // Generate star ratings
                let starsHtml = '';
                for (let i = 1; i <= 5; i++) {
                    starsHtml += i <= Math.floor(product.rating) 
                        ? `<i class="fa-solid fa-star"></i>` 
                        : `<i class="fa-regular fa-star"></i>`;
                }

                return `
                    <div class="product-card">
                        ${product.badge ? `<span class="badge">${product.badge}</span>` : ''}
                        <div class="image-container">
                            <img class="product-image" src="${product.image}" alt="${product.name}" loading="lazy">
                        </div>
                        <div class="product-info">
                            <span class="product-cat">${product.category}</span>
                            <h3 class="product-name">${product.name}</h3>
                            <div class="rating">
                                ${starsHtml} <span>(${product.reviews})</span>
                            </div>
                            <div class="price-row">
                                <span class="current-price">${product.price}</span>
                                ${product.originalPrice ? `<span class="original-price">${product.originalPrice}</span>` : ''}
                            </div>
                            <a href="${product.affiliateLink}" target="_blank" rel="noopener noreferrer" class="affiliate-btn">
                                View Deal <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Live Search Input Listener
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });

        renderCategories();
